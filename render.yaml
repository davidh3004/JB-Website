# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Dashboard: New → Blueprint → connect this repo (root must contain this file).

services:
  - type: web
    name: secure-key-vault
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    # Applies Drizzle schema to Render Postgres before the new release goes live.
    preDeployCommand: npm run db:push
    startCommand: npm start
    healthCheckPath: /api/projects/featured
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: JB
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: secure-key-vault-db
    databaseName: secure_key_vault
